
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    color: #1a1a1a;
}

header {
    background: linear-gradient(120deg, #1e3c72, #2a5298);
    color: white;
    padding: 2rem;
    text-align: center;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 2rem;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: left;
}

tr:hover {
    background: #f9fbff;
}

input {
    width: 100%;
    padding: 0.9rem;
    border-radius: 12px;
    border: 1px solid #ddd;
    margin-bottom: 1rem;
    font-size: 1rem;
}

.badge {
    background: #2a5298;
    color: white;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
}

iframe {
    width: 100%;
    height: 400px;
    border: none;
}

.example {
    padding: 10px 0;
    border-bottom: 2px solid #ddd;
    font-size: 0.95rem;
}

.example:last-child {
    border-bottom: none;
}

.audio {
    margin-left: 8px;
    text-decoration: none;
}

.header {
    background: #ffffff;
    border-bottom: 1px solid #e5e5e5;
}

.brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.6rem 1rem 0 1rem;
    text-align: center;
}

.brand img {
    height:250px;
    width: auto;
    margin-bottom: 8;
    display: block;
}

.navbar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 6px 0 10px 0;
    background: white;
    margin-top: 6;
}

.navbar a {
    text-decoration: none;
    color: #095775;
    font-weight: 500;
    font-size: 0.95rem;
}

.navbar a:hover {
    color: #b51700;
}

.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    top: 22px;
    background: white;
    min-width: 160px;
    border: 1px solid #eee;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    z-index: 100;
}

.dropdown-content a {
    display: block;
    padding: 10px;
    font-size: 0.9rem;
}

.dropdown-content a:hover {
    background: #f5f7fa;
}

.dropdown:hover .dropdown-content {
    display: block;
}

</style>

<script>
function toggle(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === "none") ? "table-row" : "none";
}
</script>

<header class="header">

    <div class="brand">
        <img src="logo_cosi.png" alt="COSÌ logo">
    </div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="#">Chi siamo</a>
        <div class="dropdown">
            <a href="#">Progetto ▾</a>
            <div class="dropdown-content">
                <a href="#">Obiettivi del progetto</a>
                <a href="#">Architettura del database</a>
                <a href="#">Schema di annotazione</a>
            </div>
        </div>
        <a href="search.html">Cerca nel database</a>
        <a href="#">Prodotti della ricerca</a>
        <a href="#">Contatti</a>
    </nav>

</header>

<div class="container">

<div class="card">
  <h2>Ricerca per segnale discorsivo</h2>
  <input id="search" placeholder="Cerca segnale...">
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Segnale</th>
<th>Fascia di frequenza</th>
<th>Microfunzioni</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="data.js"></script>

<script>
const tableBody = document.querySelector("tbody");
const input = document.getElementById("search");

function render(filter="") {
    tableBody.innerHTML = "";

    DATA
    .filter(x =>
        x.lemma.toLowerCase().includes(filter.toLowerCase()) ||
        x.micro.toLowerCase().includes(filter.toLowerCase())
    )
    .forEach(x => {
        tableBody.innerHTML += `
        <tr onclick="window.location='${x.link}'" style="cursor:pointer">
            <td><b>${x.lemma}</b></td>
            <td><span class="badge">${x.frequenza}</span></td>
            
            <td>${x.micro || "-"}</td>
        </tr>`;
    });
}

input.addEventListener("input", e => render(e.target.value));
render();
</script>

</div>

</body>
</html>
